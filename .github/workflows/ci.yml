name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v3
      with:
        version: "latest"
        enable-cache: true

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: uv sync --all-extras --dev

    - name: Run Ruff
      run: uv run ruff check .

    - name: Run Black
      run: uv run black --check .

    - name: Run Mypy
      run: uv run mypy .

    - name: Run pytest
      run: uv run pytest
